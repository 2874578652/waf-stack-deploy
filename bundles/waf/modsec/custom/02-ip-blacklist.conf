# ------------------------------------------------------------------------
# 02-ip-blacklist.conf — IP 黑名单
# ------------------------------------------------------------------------
# 黑名单 IP 直接拒绝，返回 403。
# IP 列表维护于同目录 ipblacklist.data，每行一个 IP 或 CIDR。
# 可通过 wafbot 的 /blacklist_add、/blacklist_del 命令动态管理。
#
# 规则 ID 范围: 20001–20999
# ------------------------------------------------------------------------

# 黑名单 IP：直接拒绝，记录日志
SecRule REMOTE_ADDR "@ipMatchFromFile ipblacklist.data" \
    "id:20001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Blacklisted IP'"
