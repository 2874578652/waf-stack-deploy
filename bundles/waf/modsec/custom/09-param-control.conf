# ------------------------------------------------------------------------
# 09-param-control.conf - Parameter precision controls
# ------------------------------------------------------------------------
# Rule ID range: 53001-53999
# ------------------------------------------------------------------------

# Prototype-pollution style parameter names. These are high-confidence attack
# indicators for most web applications and are blocked directly.
SecRule ARGS_NAMES "@rx (?i)(?:^|[\\[\\].])(?:__proto__|prototype)(?:$|[\\[\\].])|constructor(?:\\s*|\\[|\\.)prototype" \
    "id:53001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'Prototype pollution parameter name blocked'"

# Sensitive command-like parameter names are noisy and application-dependent.
# Observe only; promote to deny only after confirming no business false positives.
SecRule ARGS_NAMES "@pmFromFile /etc/nginx/modsec/custom/paramnameobserve.data" \
    "id:53002,\
    phase:2,\
    pass,\
    log,\
    severity:5,\
    t:none,\
    t:lowercase,\
    msg:'Sensitive parameter name observed'"
