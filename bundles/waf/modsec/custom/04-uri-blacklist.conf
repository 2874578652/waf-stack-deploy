# ------------------------------------------------------------------------
# 04-uri-blacklist.conf — URI 黑名单
# ------------------------------------------------------------------------
# 匹配 URI 的请求直接拒绝，返回 403。
# 适用于已知恶意路径、敏感路径禁止访问等场景。
# URI 列表维护于同目录 uriblacklist.data，每行一个 URI 前缀或关键词。
# 匹配方式为字符串包含（大小写不敏感）。
#
# 规则 ID 范围: 40001–40999
# ------------------------------------------------------------------------

# URI 黑名单：直接拒绝，记录日志
SecRule REQUEST_URI "@pmFromFile uriblacklist.data" \
    "id:40001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:lowercase,\
    msg:'Blacklisted URI'"
