# ------------------------------------------------------------------------
# 01-ip-whitelist.conf — IP 白名单
# ------------------------------------------------------------------------
# 白名单 IP 完全绕过 WAF 规则检测，适用于可信内网、运维 IP 等。
# IP 列表维护于同目录 ipwhitelist.data，每行一个 IP 或 CIDR。
# 可通过 wafbot 的 /whitelist_add、/whitelist_del 命令动态管理。
#
# 规则 ID 范围: 10001–10999
# ------------------------------------------------------------------------

# 白名单 IP：关闭规则引擎，完全跳过所有 WAF 检测
SecRule REMOTE_ADDR "@ipMatchFromFile ipwhitelist.data" \
    "id:10001,\
    phase:1,\
    nolog,\
    pass,\
    ctl:ruleEngine=Off"
