# ------------------------------------------------------------------------
# 07-ua-control.conf - User-Agent precision controls
# ------------------------------------------------------------------------
# Rule ID range: 51001-51999
# Data-driven controls:
#   - uablacklist.data: lower-case User-Agent substrings to block.
# Low-risk observation:
#   - missing or empty User-Agent is logged, not blocked.
# ------------------------------------------------------------------------

# Known scanner or attack-tool User-Agent substrings: deny directly.
SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/nginx/modsec/custom/uablacklist.data" \
    "id:51001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:none,\
    t:lowercase,\
    msg:'Blacklisted User-Agent'"

# Missing User-Agent: observe only to avoid breaking legitimate API clients.
SecRule &REQUEST_HEADERS:User-Agent "@eq 0" \
    "id:51002,\
    phase:1,\
    pass,\
    log,\
    severity:5,\
    msg:'Missing User-Agent observed'"

# Empty User-Agent header: observe only.
SecRule REQUEST_HEADERS:User-Agent "@rx ^\\s*$" \
    "id:51003,\
    phase:1,\
    pass,\
    log,\
    severity:5,\
    msg:'Empty User-Agent observed'"

# Extremely long User-Agent values are rarely needed and increase parser risk.
SecRule REQUEST_HEADERS:User-Agent "@rx ^.{512,}$" \
    "id:51004,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:none,\
    msg:'Overlong User-Agent blocked'"
