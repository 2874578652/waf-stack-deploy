# ------------------------------------------------------------------------
# 10-risky-path-rules.conf - Sensitive path controls
# ------------------------------------------------------------------------
# Rule ID range: 54001-54999
# Data-driven controls:
#   - sensitivepathblacklist.data: lower-case URI substrings to block.
#   - sensitivepathobserve.data: lower-case URI substrings to log only.
# ------------------------------------------------------------------------

# High-confidence sensitive file and management path probes: deny directly.
SecRule REQUEST_URI "@pmFromFile /etc/nginx/modsec/custom/sensitivepathblacklist.data" \
    "id:54001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:none,\
    t:lowercase,\
    msg:'Sensitive path blocked'"

# Common framework/CMS scan paths: observe first to avoid business breakage.
SecRule REQUEST_URI "@pmFromFile /etc/nginx/modsec/custom/sensitivepathobserve.data" \
    "id:54002,\
    phase:1,\
    pass,\
    log,\
    severity:5,\
    t:none,\
    t:lowercase,\
    msg:'Scanner-like path observed'"
