# ------------------------------------------------------------------------
# 03-uri-whitelist.conf — URI 白名单
# ------------------------------------------------------------------------
# 匹配 URI 的请求完全绕过 WAF 规则检测。
# 适用于误报率高、由业务自身保障安全的接口。
# URI 列表维护于同目录 uriwhitelist.data，每行一个 URI 前缀或关键词。
# 匹配方式为字符串包含（大小写不敏感）。
#
# 规则 ID 范围: 30001–30999
# ------------------------------------------------------------------------

# URI 白名单：关闭规则引擎，完全跳过所有 WAF 检测
SecRule REQUEST_URI "@pmFromFile uriwhitelist.data" \
    "id:30001,\
    phase:1,\
    nolog,\
    pass,\
    t:lowercase,\
    ctl:ruleEngine=Off"
