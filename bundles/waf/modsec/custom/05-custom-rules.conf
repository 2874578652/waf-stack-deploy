# ------------------------------------------------------------------------
# 05-custom-rules.conf — 自定义规则（精细化误报豁免）
# ------------------------------------------------------------------------
# 用于针对特定 URI 禁用某条 CRS 规则，避免误报。
# 适用于 URI 白名单无法覆盖的场景（如需保留部分规则检测，仅豁免个别规则）。
# 所有规则使用 phase:1 + pass + nolog，仅做控制流操作。
#
# 规则 ID 范围: 50001–50999
# ------------------------------------------------------------------------

SecRule REQUEST_URI "@rx ^/api/[^/]+/sys/sys/" \
    "id:50001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=930130"

