# ------------------------------------------------------------------------
# 08-header-control.conf - HTTP header precision controls
# ------------------------------------------------------------------------
# Rule ID range: 52001-52999
# Data-driven controls:
#   - headernameblacklist.data: lower-case request header names to block.
# ------------------------------------------------------------------------

# Block client-supplied override headers that are commonly used in routing
# and method bypass attempts. Keep the list small and explicit.
SecRule REQUEST_HEADERS_NAMES "@pmFromFile /etc/nginx/modsec/custom/headernameblacklist.data" \
    "id:52001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:none,\
    t:lowercase,\
    msg:'Blacklisted request header name'"

# Public HTTP requests should include Host. Nginx also has a default 444
# server, but this records the reason in ModSecurity audit logs.
SecRule &REQUEST_HEADERS:Host "@eq 0" \
    "id:52002,\
    phase:1,\
    deny,\
    status:400,\
    log,\
    msg:'Missing Host header blocked'"

# Very long Host values are suspicious and should not be needed by these sites.
SecRule REQUEST_HEADERS:Host "@rx ^.{256,}$" \
    "id:52003,\
    phase:1,\
    deny,\
    status:400,\
    log,\
    t:none,\
    msg:'Overlong Host header blocked'"
