server {
    listen      80;
    server_name .fnstocktest.top;

    # security
    include     nginxconfig.io/security.conf;

    # logging
    access_log  /var/log/nginx/fnstocktest.top.access.log cloudflare_cc buffer=512k flush=1m;
    error_log   /var/log/nginx/fnstocktest.top.error.log warn;

    # Stage 2 CC protection: per-IP concurrent connection cap.
    limit_conn cc_conn_per_ip 80;

    # Auth/login/register paths: strict but with a small burst for normal retries.
    location ~* ^/(?:login|signin|sign-in|register|signup|sign-up|forgot-password|reset-password|password-reset|auth|oauth|sso|user/login|user/register|api/(?:login|auth|register|signup|session|token))(?:/|$) {
        limit_req zone=cc_global burst=120 nodelay;
        limit_req zone=cc_auth burst=15 nodelay;
        proxy_pass            http://172.31.16.3;
        proxy_set_header Host $host;
        include               nginxconfig.io/proxy.conf;
    }

    # API paths: lower rate than normal pages, larger burst for short legitimate bursts.
    location ~* ^/(?:api|apis|ajax|graphql|rest|v[0-9]+)(?:/|$) {
        limit_req zone=cc_global burst=120 nodelay;
        limit_req zone=cc_api burst=60 nodelay;
        proxy_pass            http://172.31.16.3;
        proxy_set_header Host $host;
        include               nginxconfig.io/proxy.conf;
    }

    # Scanner-sensitive paths: mostly probes. Keep reachable but heavily rate-limited.
    location ~* ^/(?:wp-login\.php|wp-admin|xmlrpc\.php|phpmyadmin|pma|adminer\.php|manager/html|jmx-console|solr/admin|cgi-bin)(?:/|$) {
        limit_req zone=cc_global burst=120 nodelay;
        limit_req zone=cc_sensitive burst=8 nodelay;
        proxy_pass            http://172.31.16.3;
        proxy_set_header Host $host;
        include               nginxconfig.io/proxy.conf;
    }

    # reverse proxy
    location / {
        limit_req zone=cc_global burst=120 nodelay;
        limit_req zone=cc_page burst=80 nodelay;
        proxy_pass            http://172.31.16.3;
        proxy_set_header Host $host;
        include               nginxconfig.io/proxy.conf;
    }

    # additional config
    include nginxconfig.io/general.conf;
}
