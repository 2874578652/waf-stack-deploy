# Stage 2 CC protection zones.
# These zones use the real client IP after Cloudflare real_ip processing.
# Enforcement is applied only by server/location configs that reference them.

# The ModSecurity whitelist source file is rendered into
# /etc/nginx/modsec/custom/ipwhitelist_cc.inc so the same whitelist
# also bypasses Stage 2 CC protection with an empty limit key.
geo $cc_whitelisted {
    default 0;
    include /etc/nginx/modsec/custom/ipwhitelist_cc.inc;
}

map $cc_whitelisted $cc_limit_key {
    default $binary_remote_addr;
    1       "";
}

limit_req_zone  $cc_limit_key  zone=cc_global:20m     rate=30r/s;
limit_req_zone  $cc_limit_key  zone=cc_page:20m       rate=15r/s;
limit_req_zone  $cc_limit_key  zone=cc_api:20m        rate=10r/s;
limit_req_zone  $cc_limit_key  zone=cc_auth:20m       rate=3r/s;
limit_req_zone  $cc_limit_key  zone=cc_sensitive:20m  rate=2r/s;
limit_conn_zone $cc_limit_key  zone=cc_conn_per_ip:20m;

limit_req_status  429;
limit_conn_status 429;
limit_req_log_level warn;
limit_conn_log_level warn;
